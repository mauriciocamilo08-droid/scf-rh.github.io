    --navy-950:#060D1C;
    --navy-900:#0B1830;
    --navy-850:#0F2040;
    --navy-800:#15294F;
    --navy-700:#1D3A6B;
    --navy-600:#28518F;
    --blue-500:#2F6FED;
    --blue-400:#5091FF;
    --sky-300:#8FC1FF;
    --bg-app:#EEF2F9;
    --surface:#FFFFFF;
    --ink:#0F1B2D;
    --ink-soft:#5B6B82;
    --border:#DCE3EE;
    --danger:#B3372A; --danger-bg:#FBEAE7;
    --warn:#A56A0B; --warn-bg:#FCF1DE;
    --ok:#1D7A44; --ok-bg:#E7F5EC;
    --neutral:#6B7680; --neutral-bg:#EDEFF1;
    --radius:12px;
    --font-display:'Space Grotesk', sans-serif;
    --font-body:'Inter', sans-serif;
    --font-mono:'JetBrains Mono', monospace;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;background:var(--bg-app);color:var(--ink);font-family:var(--font-body);
    -webkit-font-smoothing:antialiased;
  }
  #root{min-height:100vh;}

  /* ---------- Login ---------- */
  .login-screen{
    min-height:100vh;display:flex;align-items:center;justify-content:center;
    background:radial-gradient(1200px 700px at 15% 10%, var(--navy-700), transparent 60%),
               radial-gradient(900px 600px at 90% 90%, var(--navy-600), transparent 55%),
               linear-gradient(160deg, var(--navy-950), var(--navy-900) 60%, var(--navy-850));
    padding:24px;
  }
  .login-card{
    width:100%;max-width:400px;background:rgba(255,255,255,0.03);
    border:1px solid rgba(255,255,255,0.09);border-radius:16px;padding:36px 32px;
    backdrop-filter:blur(6px);
  }
  .login-brand{display:flex;align-items:center;gap:12px;margin-bottom:26px;}
  .login-brand .brand-icon{width:50px;height:50px;border-radius:13px;background:#fff;padding:5px;display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 6px 18px rgba(0,0,0,0.25);}
  .login-brand .brand-icon img{width:100%;height:100%;object-fit:contain;border-radius:8px;}
  .login-brand h1{font-family:var(--font-display);font-size:22px;font-weight:700;color:#fff;margin:0;letter-spacing:-0.02em;}
  .login-brand .tag{font-size:12px;color:var(--sky-300);margin-top:2px;}
  .login-card label{color:rgba(255,255,255,0.7);}
  .login-card input{
    width:100%;padding:11px 13px;border-radius:8px;border:1px solid rgba(255,255,255,0.14);
    background:rgba(255,255,255,0.05);color:#fff;font-family:var(--font-body);font-size:14px;margin-bottom:14px;
  }
  .login-card input::placeholder{color:rgba(255,255,255,0.35);}
  .login-card input:focus{outline:none;border-color:var(--blue-400);background:rgba(255,255,255,0.08);}
  .login-btn{
    width:100%;padding:12px;border:none;border-radius:8px;background:linear-gradient(135deg,var(--blue-500),var(--navy-600));
    color:#fff;font-weight:700;font-size:14px;cursor:pointer;margin-top:4px;transition:opacity .15s ease;
    font-family:var(--font-body);
  }
  .login-btn:hover{opacity:.9;}
  .login-switch{margin-top:18px;text-align:center;font-size:13px;color:rgba(255,255,255,0.55);}
  .login-switch button{background:none;border:none;color:var(--sky-300);font-weight:600;cursor:pointer;font-size:13px;font-family:var(--font-body);}
  .login-error{background:rgba(179,55,42,0.18);border:1px solid rgba(179,55,42,0.4);color:#FFD7D0;padding:9px 12px;border-radius:8px;font-size:13px;margin-bottom:14px;}
  .login-note{font-size:12px;color:rgba(255,255,255,0.4);margin-top:20px;line-height:1.5;}
  .avatar-upload-login{display:flex;align-items:center;gap:12px;margin-bottom:16px;}
  .avatar-preview{width:52px;height:52px;border-radius:50%;background:var(--navy-700);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-family:var(--font-display);overflow:hidden;flex-shrink:0;border:1px solid rgba(255,255,255,0.15);}
  .avatar-preview img{width:100%;height:100%;object-fit:cover;}
  .file-btn{display:inline-block;padding:8px 12px;border-radius:7px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);color:rgba(255,255,255,0.8);font-size:12.5px;cursor:pointer;font-weight:600;}
  .file-btn input{display:none;}

  /* ---------- Shell ---------- */
  .shell{display:flex;min-height:100vh;}
  .sidebar{
    width:232px;flex-shrink:0;background:linear-gradient(180deg, var(--navy-950), var(--navy-900) 55%, var(--navy-850));
    display:flex;flex-direction:column;padding:20px 14px;position:sticky;top:0;height:100vh;
  }
  .sb-brand{display:flex;align-items:center;gap:10px;padding:6px 8px 22px;}
  .sb-brand .brand-icon{width:38px;height:38px;border-radius:10px;background:#fff;padding:4px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .sb-brand .brand-icon img{width:100%;height:100%;object-fit:contain;border-radius:6px;}
  .sb-brand-text h1{font-family:var(--font-display);font-size:16.5px;font-weight:700;color:#fff;margin:0;line-height:1.1;letter-spacing:-0.01em;}
  .sb-brand-text .tag{font-size:10.5px;color:var(--sky-300);letter-spacing:.03em;}
  .sb-nav{display:flex;flex-direction:column;gap:3px;flex:1;}
  .sb-item{
    display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:9px;cursor:pointer;
    color:rgba(255,255,255,0.6);font-size:13.5px;font-weight:600;transition:background .14s ease,color .14s ease;
    border:1px solid transparent;
  }
  .sb-item svg{width:17px;height:17px;flex-shrink:0;}
  .sb-item:hover{background:rgba(255,255,255,0.05);color:#fff;}
  .sb-item.active{background:rgba(47,111,237,0.18);border-color:rgba(47,111,237,0.35);color:#fff;}
  .sb-foot{border-top:1px solid rgba(255,255,255,0.08);padding-top:14px;margin-top:10px;}
  .sb-user{display:flex;align-items:center;gap:10px;padding:6px 8px;}
  .sb-user .avatar-preview{width:34px;height:34px;font-size:13px;}
  .sb-user-info{overflow:hidden;}
  .sb-user-info .name{font-size:13px;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .sb-user-info .email{font-size:11px;color:rgba(255,255,255,0.45);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .sb-logout{display:flex;align-items:center;gap:8px;margin-top:10px;padding:9px 12px;border-radius:8px;color:rgba(255,255,255,0.55);font-size:12.5px;font-weight:600;cursor:pointer;}
  .sb-logout:hover{background:rgba(255,255,255,0.05);color:#fff;}
  .sb-logout svg{width:15px;height:15px;}

  .main{flex:1;min-width:0;padding:26px 30px 60px;}
  .topbar{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:22px;gap:16px;flex-wrap:wrap;}
  .topbar h2{font-family:var(--font-display);font-size:21px;margin:0;letter-spacing:-0.01em;color:var(--ink);}
  .topbar .sub{font-size:13px;color:var(--ink-soft);margin-top:3px;}
  .today-chip{display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--border);border-radius:999px;padding:8px 16px;font-size:13px;color:var(--ink-soft);}
  .today-chip b{color:var(--navy-700);font-family:var(--font-mono);}

  /* ---------- Cards / shared ---------- */
  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;}
  .card + .card{margin-top:18px;}
  .card-title{font-family:var(--font-display);font-size:15px;font-weight:600;margin:0 0 14px;color:var(--ink);}
  .card-sub{font-size:12.5px;color:var(--ink-soft);margin:-10px 0 16px;}

  .form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;}
  label{display:block;font-size:12px;font-weight:600;color:var(--ink-soft);margin-bottom:6px;text-transform:uppercase;letter-spacing:.03em;}
  input[type=text],input[type=date],input[type=email],input[type=password],select,textarea{
    width:100%;padding:9px 11px;border:1px solid var(--border);border-radius:7px;
    font-family:var(--font-body);font-size:14px;background:#fff;color:var(--ink);
  }
  input:focus,select:focus,textarea:focus{outline:2px solid var(--blue-500);outline-offset:1px;border-color:var(--blue-500);}
  .field{margin-bottom:0;}
  .days-group{display:flex;flex-wrap:wrap;gap:6px;}
  .day-pill{position:relative;}
  .day-pill input{position:absolute;opacity:0;width:100%;height:100%;cursor:pointer;margin:0;}
  .day-pill span{display:inline-flex;align-items:center;justify-content:center;width:40px;height:32px;border-radius:7px;border:1px solid var(--border);font-size:12px;font-weight:600;color:var(--ink-soft);background:#fff;transition:all .12s ease;}
  .day-pill input:checked + span{background:var(--navy-700);border-color:var(--navy-700);color:#fff;}

  .btn{appearance:none;border:none;cursor:pointer;font-family:var(--font-body);font-weight:600;font-size:13.5px;padding:10px 18px;border-radius:8px;display:inline-flex;align-items:center;gap:6px;transition:opacity .15s ease,background .15s ease;}
  .btn-primary{background:linear-gradient(135deg,var(--blue-500),var(--navy-600));color:#fff;}
  .btn-primary:hover{opacity:.9;}
  .btn-primary:disabled{opacity:.45;cursor:not-allowed;}
  .btn-ghost{background:transparent;color:var(--ink-soft);border:1px solid var(--border);}
  .btn-ghost:hover{background:var(--neutral-bg);}
  .btn-row{display:flex;gap:10px;margin-top:16px;flex-wrap:wrap;}
  .btn-sm{padding:7px 12px;font-size:12.5px;border-radius:7px;}
  .btn-danger-text{background:transparent;color:var(--danger);border:none;cursor:pointer;font-weight:600;font-size:12.5px;padding:6px 8px;}
  .btn-link{background:transparent;color:var(--navy-600);border:none;cursor:pointer;font-weight:600;font-size:12.5px;padding:6px 8px;}

  table{width:100%;border-collapse:collapse;font-size:13.5px;}
  thead th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--ink-soft);font-weight:700;padding:8px 10px;border-bottom:1px solid var(--border);white-space:nowrap;}
  tbody td{padding:10px;border-bottom:1px solid var(--border);vertical-align:middle;}
  tbody tr:hover{background:#F8FAFD;}
  .mono{font-family:var(--font-mono);font-size:13px;}
  .empty-row td{text-align:center;color:var(--ink-soft);padding:28px;font-size:13.5px;}
  .table-scroll{overflow-x:auto;}

  .badge{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:999px;font-size:12px;font-weight:700;white-space:nowrap;}
  .badge-dot{width:6px;height:6px;border-radius:50%;}
  .badge-vencida{background:var(--danger-bg);color:var(--danger);} .badge-vencida .badge-dot{background:var(--danger);}
  .badge-atencao{background:var(--warn-bg);color:var(--warn);} .badge-atencao .badge-dot{background:var(--warn);}
  .badge-pendente{background:var(--ok-bg);color:var(--ok);} .badge-pendente .badge-dot{background:var(--ok);}
  .badge-gozada{background:var(--neutral-bg);color:var(--neutral);} .badge-gozada .badge-dot{background:var(--neutral);}

  .stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:18px;}
  .stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;}
  .stat-value{font-family:var(--font-mono);font-size:26px;font-weight:600;color:var(--ink);}
  .stat-label{font-size:12px;color:var(--ink-soft);margin-top:2px;font-weight:600;text-transform:uppercase;letter-spacing:.03em;}
  .stat.vencida .stat-value{color:var(--danger);}
  .stat.atencao .stat-value{color:var(--warn);}
  .stat.pendente .stat-value{color:var(--ok);}
  .stat.gozada .stat-value{color:var(--neutral);}
  .stat.info .stat-value{color:var(--navy-700);}

  .filters-row{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px;align-items:flex-end;}
  .filters-row .field{min-width:150px;flex:1;}
  .toolbar{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:14px;}

  .subtabs{display:flex;gap:6px;margin-bottom:18px;border-bottom:1px solid var(--border);}
  .subtab-btn{appearance:none;border:none;background:transparent;cursor:pointer;font-family:var(--font-body);font-size:13.5px;font-weight:600;color:var(--ink-soft);padding:9px 14px;border-bottom:2px solid transparent;margin-bottom:-1px;}
  .subtab-btn:hover{color:var(--ink);}
  .subtab-btn.active{color:var(--navy-700);border-bottom-color:var(--blue-500);}

  .helper-text{font-size:12px;color:var(--ink-soft);margin-top:6px;}
  .section-note{font-size:12.5px;color:#1C4A73;background:#E7F1FC;border:1px solid #C7DEF5;border-radius:8px;padding:10px 14px;margin-bottom:18px;}
  .upload-box{border:1.5px dashed var(--border);border-radius:10px;padding:16px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;background:#FBFCFE;}
  .upload-box .txt{font-size:13px;color:var(--ink-soft);}
  .upload-box .txt strong{color:var(--ink);}
  .file-input-btn{position:relative;overflow:hidden;display:inline-flex;}
  .file-input-btn input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;}

  .bar-row{display:grid;grid-template-columns:130px 1fr 34px;align-items:center;gap:10px;margin-bottom:10px;font-size:13px;}
  .bar-track{height:9px;background:var(--neutral-bg);border-radius:999px;overflow:hidden;}
  .bar-fill{height:100%;background:linear-gradient(90deg,var(--blue-500),var(--navy-700));border-radius:999px;}

  .avatar-lg{width:64px;height:64px;border-radius:50%;background:var(--navy-700);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:22px;font-family:var(--font-display);overflow:hidden;flex-shrink:0;}
  .avatar-lg img{width:100%;height:100%;object-fit:cover;}

  .loading{padding:60px;text-align:center;color:var(--ink-soft);font-size:14px;}
  .upload-result{margin-top:12px;font-size:13px;background:#F8FAFD;border:1px solid var(--border);border-radius:8px;padding:12px 14px;}
  .upload-result .ok{color:var(--ok);font-weight:700;}
  .upload-result .warn{color:var(--warn);font-weight:700;}

  @media (max-width:900px){
    .sidebar{position:fixed;left:-240px;z-index:50;transition:left .2s ease;}
    .sidebar.open{left:0;}
    .main{padding:20px 16px 60px;}
  }
</style>
</head>
<body>
<div id="root"><div class="loading">Carregando SCF RH…</div></div>

<script>
/* ===================== Estado global ===================== */
let perfil = null;              // {nome,email,senha,foto}
let colaboradores = [];
let unidades = [];
let folgas = [];
let loggedIn = false;
let loginMode = 'login';        // 'login' | 'setup'
let loginError = '';
let activePage = 'dashboard';   // dashboard | cadastro | controle | configuracoes
let cadastroSubtab = 'colaboradores'; // colaboradores | unidades
let editingColaboradorId = null;
let editingUnidadeId = null;
let editingFolgaId = null;
let reportFilters = {unidade:'', funcao:'', status:'', busca:'', dataDe:'', dataAte:'', limiteDe:'', limiteAte:''};
let dashboardFilters = {unidade:'', status:''};
let usuariosCriarError = '';
let uploadResultColab = null;
let uploadResultUnidade = null;
let uploadResultFolga = null;
let controleUploadUnidadeId = '';
let tempFoto = null; // foto temporária durante edição (login/config)

const STORAGE_SHARED = true;
const PRAZO_DIAS = 120;
const ALERTA_DIAS = 30;

/* ===================== Supabase ===================== */
// Preencha com os dados do seu projeto (Project Settings > API no painel do Supabase)
const SUPABASE_URL = 'https://ehpcvmbkwbekhksciaoc.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVocGN2bWJrd2Jla2hrc2NpYW9jIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM1Mzk1MjIsImV4cCI6MjA5OTExNTUyMn0.b26Iq_PhLpMVTSeDiaRLAFliM3P0YTKvQh3BJUscoPQ';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
// Client isolado (não persiste sessão) usado só para criar novos usuários sem deslogar o master atual
const sbAdmin = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, { auth: { persistSession:false, autoRefreshToken:false, detectSessionInUrl:false } });

/* ===================== Perfil / permissões ===================== */
function podeCriar(){ return !!perfil && (perfil.papel==='master' || perfil.papel==='editor'); }
function podeEditar(){ return !!perfil && (perfil.papel==='master' || perfil.papel==='editor'); }
function podeExcluir(){ return !!perfil && perfil.papel==='master'; }
function ehMaster(){ return !!perfil && perfil.papel==='master'; }
function papelLabel(p){ return {master:'Master', editor:'Editor', visualizador:'Visualizador'}[p] || p; }

async function carregarPerfilAtual(){
  const { data: { user } } = await sb.auth.getUser();
  if(!user) return null;
  const { data, error } = await sb.from('usuarios_perfil').select('*').eq('id', user.id).maybeSingle();
  if(error){ console.error('carregarPerfilAtual', error); return null; }
  return data;
}
async function bootstrapMaster(user, nome){
  const { data, error } = await sb.from('usuarios_perfil').insert({ id:user.id, nome, email:user.email, foto:null, papel:'master', ativo:true }).select().maybeSingle();
  if(error) throw error;
  return data;
}
async function salvarPerfilAtual(campos){
  if(!perfil) return;
  const { error } = await sb.from('usuarios_perfil').update(campos).eq('id', perfil.id);
  if(error){ alert('Não foi possível salvar o perfil: ' + error.message); throw error; }
  Object.assign(perfil, campos);
}
async function criarUsuario(nome, email, senha, papel){
  const { data, error } = await sbAdmin.auth.signUp({ email, password: senha, options: { data: { nome } } });
  if(error) throw error;
  if(!data.user) throw new Error('Não foi possível criar o usuário.');
  const { error: err2 } = await sb.from('usuarios_perfil').insert({ id:data.user.id, nome, email, foto:null, papel, ativo:true });
  if(err2) throw err2;
  try{ await sbAdmin.auth.signOut(); }catch(e){}
  return data.user;
}
async function carregarListaUsuarios(){
  const { data, error } = await sb.from('usuarios_perfil').select('*').order('criado_em', {ascending:true});
  if(error){ console.error('carregarListaUsuarios', error); return []; }
  return data;
}

// Adaptador que faz o app_data (protegido por RLS) se comportar como o antigo window.storage
async function dbGet(key){
  const { data, error } = await sb.from('app_data').select('value').eq('key', key).maybeSingle();
  if(error){ console.error('dbGet', key, error); return null; }
  if(!data) return null;
  return { key, value: JSON.stringify(data.value) };
}
async function dbSet(key, valueStr){
  const value = JSON.parse(valueStr);
  const { error } = await sb.from('app_data').upsert({ key, value });
  if(error){ console.error('dbSet', key, error); throw error; }
  return { key, value: valueStr };
}
window.storage = {
  get: async (key, _shared) => dbGet(key),

function fmtDate(iso){ if(!iso) return '—'; const [y,m,d]=iso.split('-'); return `${d}/${m}/${y}`; }
function addDays(iso, days){ const d = new Date(iso+'T00:00:00'); d.setDate(d.getDate()+days); return d.toISOString().slice(0,10); }
function todayISO(){ return new Date().toISOString().slice(0,10); }
function diffDays(fromISO, toISO){ const a=new Date(fromISO+'T00:00:00'); const b=new Date(toISO+'T00:00:00'); return Math.round((b-a)/86400000); }
function escapeHtml(str){ if(str===undefined||str===null) return ''; return String(str).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function escapeAttr(str){ return escapeHtml(str); }
function initials(nome){ if(!nome) return '?'; return nome.trim().split(/\s+/).slice(0,2).map(s=>s[0]).join('').toUpperCase(); }

function getStatusInfo(folga){
  if(folga.status === 'gozada') return {key:'gozada', label:'Gozada', badgeClass:'badge-gozada'};
  const dias = diffDays(todayISO(), folga.dataLimite);
  if(dias < 0) return {key:'vencida', label:`Vencida (${Math.abs(dias)}d)`, badgeClass:'badge-vencida', diasRestantes:dias};
  if(dias <= ALERTA_DIAS) return {key:'atencao', label:`${dias}d restantes`, badgeClass:'badge-atencao', diasRestantes:dias};
  return {key:'pendente', label:`${dias}d restantes`, badgeClass:'badge-pendente', diasRestantes:dias};
}

function parseFlexibleDate(value){
  if(value instanceof Date && !isNaN(value)){
    return `${value.getUTCFullYear()}-${pad2(value.getUTCMonth()+1)}-${pad2(value.getUTCDate())}`;
  }
  if(typeof value === 'number'){
    const utc_days = Math.floor(value - 25569);
    const date = new Date(utc_days * 86400 * 1000);
    return `${date.getUTCFullYear()}-${pad2(date.getUTCMonth()+1)}-${pad2(date.getUTCDate())}`;
  }
  if(typeof value === 'string'){
    const s = value.trim();
    let m = s.match(/^(\d{4})-(\d{1,2})-(\d{1,2})$/);
    if(m) return `${m[1]}-${pad2(m[2])}-${pad2(m[3])}`;
    m = s.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})$/);
    if(m) return `${m[3]}-${pad2(m[1])}-${pad2(m[2])}`;
  }
  return null;
}

function normalizeRow(row){
  const out = {};
  Object.keys(row).forEach(k=>{ out[String(k).trim().toLowerCase()] = row[k]; });
  return out;
}
function pick(row, keys){
  for(const k of keys){ if(row[k]!==undefined && row[k]!=='') return row[k]; }
  return '';
}
function parseDiasTrabalho(str){
  if(!str) return [];
  return String(str).split(/[,;/]/).map(s=>s.trim().toLowerCase()).map(s=>{
    const found = DIAS_SEMANA.find(d=> s.startsWith(d.k) || d.l.toLowerCase().startsWith(s.slice(0,3)));
    return found ? found.k : null;
  }).filter(Boolean);
}

function readSpreadsheet(file, callback){
  const reader = new FileReader();
  reader.onload = (e)=>{
    try{
      const data = new Uint8Array(e.target.result);
      const wb = XLSX.read(data, {type:'array', cellDates:true});
      const sheet = wb.Sheets[wb.SheetNames[0]];
      const json = XLSX.utils.sheet_to_json(sheet, {defval:''});
      callback(null, json);
    }catch(err){ callback(err); }
  };
  reader.onerror = ()=> callback(new Error('Erro de leitura'));
  reader.readAsArrayBuffer(file);
}

function bindLoginEvents(){
  const formSetup = document.getElementById('formSetup');
  if(formSetup){
    document.getElementById('setupFoto').addEventListener('change', (e)=>{
      const file = e.target.files[0];
      if(!file) return;
      const reader = new FileReader();
      reader.onload = (ev)=>{ tempFoto = ev.target.result; render(); };
      reader.readAsDataURL(file);
    });
    formSetup.addEventListener('submit', async (e)=>{
      e.preventDefault();
      const nome = document.getElementById('setupNome').value.trim();
      const email = document.getElementById('setupEmail').value.trim();
      const senha = document.getElementById('setupSenha').value;
      if(!nome || !email || !senha) return;
      const submitBtn = formSetup.querySelector('button[type="submit"]');
      submitBtn.disabled = true;
      const { data, error } = await sb.auth.signUp({ email, password: senha, options: { data: { nome } } });
      submitBtn.disabled = false;
      if(error){ loginError = error.message; render(); return; }
      if(data.session){
        // Confirmação de e-mail desativada: já entra direto
        try{
          const row = await bootstrapMaster(data.user, nome);
          if(tempFoto){ await sb.from('usuarios_perfil').update({foto:tempFoto}).eq('id', data.user.id); row.foto = tempFoto; }
          perfil = row;
        }catch(err){
          await sb.auth.signOut();
          loginError = 'Conta criada, mas não foi possível preparar o perfil (' + err.message + '). Se já existe um administrador no sistema, peça para ele te cadastrar em Usuários.';
          render();
          return;
        }
        tempFoto = null;
        loggedIn = true;
        loginError = '';
        await loadData();
        render();
      }else{
        // Confirmação de e-mail ativada: precisa confirmar antes de entrar
        tempFoto = null;
        loginMode = 'login';
        loginError = '';
        alert('Conta criada! Verifique seu e-mail para confirmar o cadastro e depois faça login.');
        render();
      }
    });
    document.getElementById('btnGoLogin').addEventListener('click', ()=>{ loginMode='login'; loginError=''; render(); });
  }
  const formLogin = document.getElementById('formLogin');
  if(formLogin){
    formLogin.addEventListener('submit', async (e)=>{
      e.preventDefault();
      const email = document.getElementById('loginEmail').value.trim();
      const senha = document.getElementById('loginSenha').value;
      const submitBtn = formLogin.querySelector('button[type="submit"]');
      submitBtn.disabled = true;
      const { error } = await sb.auth.signInWithPassword({ email, password: senha });
      submitBtn.disabled = false;
      if(error){
        loginError = 'E-mail ou senha incorretos.';
        render();
        return;
      }
      const { data: { user } } = await sb.auth.getUser();
      let row = await carregarPerfilAtual();
      if(!row){
        const { count } = await sb.from('usuarios_perfil').select('*', { count:'exact', head:true });
        if(count === 0){
          try{ row = await bootstrapMaster(user, email.split('@')[0]); }catch(err){ row = null; }
        }
      }
      if(!row){
        loginError = 'Seu usuário ainda não tem um perfil configurado no sistema. Peça para o administrador te cadastrar em Usuários.';
        await sb.auth.signOut();
        render();
        return;
      }
      if(!row.ativo){
        loginError = 'Seu acesso foi desativado. Fale com o administrador do sistema.';
        await sb.auth.signOut();
        render();
        return;
      }
      loginError = '';
      loggedIn = true;
      perfil = row;
      await loadData();
      render();
    });
    document.getElementById('btnGoSetup').addEventListener('click', ()=>{ loginMode='setup'; loginError=''; render(); });
  }
}

                  <td><strong>${f.colab? escapeHtml(f.colab.nome) : '(removido)'}</strong></td>
                  <td>${f.colab? escapeHtml(f.colab.unidade) : '—'}</td>

                  <td class="mono">${fmtDate(f.dataLimite)}</td>

        </table>
      </div>
    </div>

      <p class="card-title">Pendências por unidade</p>

      ${Object.keys(porUnidade).length===0 ? `<div class="section-note">Nenhuma pendência registrada.</div>` :
        Object.entries(porUnidade).sort((a,b)=>b[1]-a[1]).map(([u,qtd])=>`
          <div class="bar-row">
            <span>${escapeHtml(u)}</span>
            <div class="bar-track"><div class="bar-fill" style="width:${(qtd/maxUnidade*100).toFixed(0)}%"></div></div>
            <span class="mono">${qtd}</span>
          </div>
        `).join('')
      }
    </div>
  `;

  document.getElementById('dfUnidade').addEventListener('change', (e)=>{ dashboardFilters.unidade = e.target.value; renderDashboard(); });
  document.getElementById('dfStatus').addEventListener('change', (e)=>{ dashboardFilters.status = e.target.value; renderDashboard(); });

  if(dfLimpar) dfLimpar.addEventListener('click', ()=>{ dashboardFilters = {unidade:'', status:''}; renderDashboard(); });
}

  inner.innerHTML = `

      <p class="card-title">Importar unidades por planilha</p>

      </div>
      ${uploadResultUnidade ? `<div class="upload-result"><span class="ok">${uploadResultUnidade.importadas} importadas</span> · <span class="warn">${uploadResultUnidade.ignoradas} ignoradas (já existiam)</span></div>` : ''}

    <div class="card">
      <p class="card-title">Unidades cadastradas (${unidades.length})</p>
      <div class="table-scroll">
        <table>
          <thead><tr><th>Nome</th><th>Colaboradores</th><th></th></tr></thead>
          <tbody>
            ${unidades.length===0? `<tr class="empty-row"><td colspan="3">Nenhuma unidade cadastrada ainda.</td></tr>` :
              unidades.map(u=>`
                <tr>
                  <td><strong>${escapeHtml(u.nome)}</strong></td>
                  <td>${colaboradores.filter(c=>c.unidade===u.nome).length}</td>
                  <td>
                    ${podeE ? `<button class="btn-link" data-edit-un="${u.id}">Editar</button>` : ''}
                    ${podeX ? `<button class="btn-danger-text" data-del-un="${u.id}">Excluir</button>` : ''}
                    ${(!podeE && !podeX) ? '—' : ''}
                  </td>
                </tr>
              `).join('')}
          </tbody>
        </table>
      </div>
    </div>
  `;

  const formU = document.getElementById('formUnidade');
  if(formU) formU.addEventListener('submit', async (e)=>{
    e.preventDefault();
    const nome = document.getElementById('uNome').value.trim();
    if(!nome) return;
    if(editingUnidadeId){
      const oldNome = unidades.find(u=>u.id===editingUnidadeId).nome;
      const idx = unidades.findIndex(u=>u.id===editingUnidadeId);
      unidades[idx] = {...unidades[idx], nome};
      colaboradores.forEach(c=>{ if(c.unidade===oldNome) c.unidade = nome; });
      editingUnidadeId = null;
      await saveColaboradores();
    }else{
      if(unidades.some(u=>u.nome.toLowerCase()===nome.toLowerCase())){ alert('Já existe uma unidade com esse nome.'); return; }
      unidades.push({id:uid(), nome});
    }
    await saveUnidades();
    renderCadastroUnidades();
  });
  const cancelU = document.getElementById('cancelUnidade');
  if(cancelU) cancelU.addEventListener('click', ()=>{ editingUnidadeId=null; renderCadastroUnidades(); });

  inner.querySelectorAll('[data-edit-un]').forEach(b=>b.addEventListener('click', ()=>{ editingUnidadeId=b.dataset.editUn; renderCadastroUnidades(); }));
  inner.querySelectorAll('[data-del-un]').forEach(b=>b.addEventListener('click', async ()=>{
    const u = unidades.find(x=>x.id===b.dataset.delUn);
    const emUso = colaboradores.some(c=>c.unidade===u.nome);
    if(emUso && !confirm(`Existem colaboradores cadastrados na unidade "${u.nome}". Excluir mesmo assim?`)) return;
    if(!emUso && !confirm('Excluir esta unidade?')) return;
    unidades = unidades.filter(x=>x.id!==b.dataset.delUn);
    await saveUnidades();
    renderCadastroUnidades();
  }));

  const fileU = document.getElementById('fileUnidades');
  if(fileU) fileU.addEventListener('change', (e)=>{
    const file = e.target.files[0]; if(!file) return;
    readSpreadsheet(file, async (err, json)=>{
      if(err){ alert('Não foi possível ler o arquivo.'); return; }
      let importadas=0, ignoradas=0;
      json.forEach(row=>{
        const r = normalizeRow(row);
        const nome = String(pick(r,['nome','unidade'])).trim();
        if(!nome) return;
        if(unidades.some(u=>u.nome.toLowerCase()===nome.toLowerCase())){ ignoradas++; return; }
        unidades.push({id:uid(), nome});
        importadas++;
      });
      await saveUnidades();
      uploadResultUnidade = {importadas, ignoradas};
      renderCadastroUnidades();
    });
  });
}

    const unidade = document.getElementById('cUnidade').value;
    const funcao = document.getElementById('cFuncao').value.trim();
    const telefone = document.getElementById('cTelefone').value.trim();

      const idx = colaboradores.findIndex(c=>c.id===editingColaboradorId);
      colaboradores[idx] = {...colaboradores[idx], nome, matricula, unidade, funcao, telefone, admissao, diasTrabalho};
      editingColaboradorId = null;
    }else{
      colaboradores.push({id:uid(), nome, matricula, unidade, funcao, telefone, admissao, diasTrabalho});

    renderCadastroColaboradores();

    colaboradores = colaboradores.filter(c=>c.id!==id);

    renderCadastroColaboradores();

        }
        colaboradores.push({id:uid(), nome, matricula, unidade:unidadeNome, funcao, telefone, admissao, diasTrabalho});
        importados++;
      });
      await saveUnidades(); await saveColaboradores();
      uploadResultColab = {importados, ignorados};
      renderCadastroColaboradores();
    });
  });
}

        <div style="display:flex;gap:8px;flex-wrap:wrap;">

  });
  const cancelF = document.getElementById('cancelFolga');
  if(cancelF) cancelF.addEventListener('click', ()=>{ editingFolgaId=null; renderControle(); });

  el.querySelectorAll('[data-edit-folga]').forEach(b=>b.addEventListener('click', ()=>{ editingFolgaId=b.dataset.editFolga; renderControle(); el.scrollIntoView({behavior:'smooth'}); }));
  el.querySelectorAll('[data-del-folga]').forEach(b=>b.addEventListener('click', async ()=>{
    if(!confirm('Excluir este registro de folga?')) return;
    folgas = folgas.filter(f=>f.id!==b.dataset.delFolga);
    await saveFolgas();
    renderControle();
  }));
  el.querySelectorAll('[data-gozar]').forEach(b=>b.addEventListener('click', async ()=>{
    const id = b.dataset.gozar;
    const dataGozo = prompt('Informe a data em que a folga foi tirada (AAAA-MM-DD):', todayISO());
    if(!dataGozo) return;
    if(!/^\d{4}-\d{2}-\d{2}$/.test(dataGozo)){ alert('Data inválida. Use o formato AAAA-MM-DD.'); return; }
    const idx = folgas.findIndex(f=>f.id===id);
    folgas[idx] = {...folgas[idx], status:'gozada', dataGozo};
    await saveFolgas();
    renderControle();
  }));

  const uploadUnidadeSel = document.getElementById('uploadUnidade');
  if(uploadUnidadeSel) uploadUnidadeSel.addEventListener('change', (e)=>{ controleUploadUnidadeId = e.target.value; });

  const fileFolgas = document.getElementById('fileFolgas');
  if(fileFolgas) fileFolgas.addEventListener('change', (e)=>{
    const file = e.target.files[0]; if(!file) return;
    if(!controleUploadUnidadeId){ alert('Selecione a unidade antes de enviar a planilha.'); e.target.value=''; return; }
    const unidade = unidades.find(u=>u.id===controleUploadUnidadeId);
    readSpreadsheet(file, async (err, json)=>{
      if(err){ alert('Não foi possível ler o arquivo.'); return; }
      let importadas=0; const naoEncontrados=[];
      json.forEach(row=>{
        const r = normalizeRow(row);
        const nome = String(pick(r,['nome'])).trim();
        const dataRaw = pick(r,['data','dia','datatrabalhada','data trabalhada','data do feriado']);
        if(!nome || !dataRaw) return;
        const dataFeriado = parseFlexibleDate(dataRaw);
        if(!dataFeriado) return;
        const colab = colaboradores.find(c=> c.unidade===unidade.nome && c.nome.trim().toLowerCase()===nome.toLowerCase());
        if(!colab){ naoEncontrados.push(nome); return; }
        folgas.push({id:uid(), colaboradorId:colab.id, dataFeriado, dataLimite:addDays(dataFeriado, PRAZO_DIAS), obs:'Importado por planilha', status:'pendente', dataGozo:null});
        importadas++;
      });
      await saveFolgas();
      uploadResultFolga = {importadas, naoEncontrados};
      renderControle();
    });
  });
}

/* ===================== Relatórios ===================== */
function renderRelatorios(){
  const el = document.getElementById('pageContent');
  const funcoesExistentes = [...new Set(colaboradores.map(c=>c.funcao).filter(Boolean))].sort();

  let linhas = folgas.map(f=>({...f, colab: colaboradores.find(c=>c.id===f.colaboradorId), statusInfo:getStatusInfo(f)}));

  if(reportFilters.unidade) linhas = linhas.filter(f=> f.colab && f.colab.unidade === reportFilters.unidade);
  if(reportFilters.funcao) linhas = linhas.filter(f=> f.colab && f.colab.funcao === reportFilters.funcao);
  if(reportFilters.status) linhas = linhas.filter(f=> f.statusInfo.key === reportFilters.status);
  if(reportFilters.dataDe) linhas = linhas.filter(f=> f.dataFeriado >= reportFilters.dataDe);
  if(reportFilters.dataAte) linhas = linhas.filter(f=> f.dataFeriado <= reportFilters.dataAte);
  if(reportFilters.limiteDe) linhas = linhas.filter(f=> f.dataLimite >= reportFilters.limiteDe);
  if(reportFilters.limiteAte) linhas = linhas.filter(f=> f.dataLimite <= reportFilters.limiteAte);
  if(reportFilters.busca){
    const q = reportFilters.busca.trim().toLowerCase();
    linhas = linhas.filter(f=> f.colab && (f.colab.nome.toLowerCase().includes(q) || String(f.colab.matricula||'').toLowerCase().includes(q)));
  }
  linhas = linhas.sort((a,b)=> new Date(a.dataLimite) - new Date(b.dataLimite));

  const resumo = {
    vencida: linhas.filter(f=>f.statusInfo.key==='vencida').length,
    atencao: linhas.filter(f=>f.statusInfo.key==='atencao').length,
    pendente: linhas.filter(f=>f.statusInfo.key==='pendente').length,
    gozada: linhas.filter(f=>f.statusInfo.key==='gozada').length,
  };

  const filtrosAtivos = reportFilters.unidade || reportFilters.funcao || reportFilters.status || reportFilters.busca || reportFilters.dataDe || reportFilters.dataAte || reportFilters.limiteDe || reportFilters.limiteAte;

  el.innerHTML = `
    <div class="card">
      <p class="card-title">Filtros</p>
      <div class="form-grid">
        <div class="field">
          <label>Unidade</label>
          <select id="rfUnidade">
            <option value="">Todas</option>
            ${unidades.map(u=>`<option value="${escapeAttr(u.nome)}" ${reportFilters.unidade===u.nome?'selected':''}>${escapeHtml(u.nome)}</option>`).join('')}
          </select>
        </div>
        <div class="field">
          <label>Função</label>
          <select id="rfFuncao">
            <option value="">Todas</option>
            ${funcoesExistentes.map(fn=>`<option value="${escapeAttr(fn)}" ${reportFilters.funcao===fn?'selected':''}>${escapeHtml(fn)}</option>`).join('')}
          </select>
        </div>
        <div class="field">
          <label>Status</label>
          <select id="rfStatus">
            <option value="">Todos</option>
            <option value="vencida" ${reportFilters.status==='vencida'?'selected':''}>Vencidas</option>
            <option value="atencao" ${reportFilters.status==='atencao'?'selected':''}>Vencendo (≤${ALERTA_DIAS}d)</option>
            <option value="pendente" ${reportFilters.status==='pendente'?'selected':''}>Dentro do prazo</option>
            <option value="gozada" ${reportFilters.status==='gozada'?'selected':''}>Gozadas</option>
          </select>
        </div>
        <div class="field"><label>Buscar (nome ou matrícula)</label><input type="text" id="rfBusca" placeholder="Digite para buscar…" value="${escapeAttr(reportFilters.busca)}"></div>
        <div class="field"><label>Feriado trabalhado — de</label><input type="date" id="rfDataDe" value="${reportFilters.dataDe}"></div>
        <div class="field"><label>Feriado trabalhado — até</label><input type="date" id="rfDataAte" value="${reportFilters.dataAte}"></div>
        <div class="field"><label>Data limite — de</label><input type="date" id="rfLimiteDe" value="${reportFilters.limiteDe}"></div>
        <div class="field"><label>Data limite — até</label><input type="date" id="rfLimiteAte" value="${reportFilters.limiteAte}"></div>
      </div>
      <div class="btn-row">
        ${filtrosAtivos ? `<button type="button" class="btn btn-ghost btn-sm" id="rfLimpar">Limpar filtros</button>` : ''}
        <button type="button" class="btn btn-primary btn-sm" id="rfExportar" ${linhas.length===0?'disabled':''}>Exportar Excel (${linhas.length})</button>
      </div>
    </div>

    <div class="stats-grid">
      <div class="stat vencida"><div class="stat-value">${resumo.vencida}</div><div class="stat-label">Vencidas</div></div>
      <div class="stat atencao"><div class="stat-value">${resumo.atencao}</div><div class="stat-label">Vencendo (≤${ALERTA_DIAS}d)</div></div>
      <div class="stat pendente"><div class="stat-value">${resumo.pendente}</div><div class="stat-label">Dentro do prazo</div></div>
      <div class="stat gozada"><div class="stat-value">${resumo.gozada}</div><div class="stat-label">Gozadas</div></div>
    </div>

    <div class="card">
      <p class="card-title">Resultado (${linhas.length})</p>
      <div class="table-scroll">
        <table>
          <thead><tr><th>Colaborador</th><th>Matrícula</th><th>Função</th><th>Unidade</th><th>Feriado</th><th>Data limite</th><th>Status</th><th>Gozo</th></tr></thead>
          <tbody>
            ${linhas.length===0 ? `<tr class="empty-row"><td colspan="8">Nenhum registro encontrado para os filtros selecionados.</td></tr>` :
              linhas.map(f=>`
                <tr>
                  <td><strong>${f.colab? escapeHtml(f.colab.nome) : '(removido)'}</strong></td>
                  <td class="mono">${f.colab? escapeHtml(f.colab.matricula||'—') : '—'}</td>
                  <td>${f.colab? escapeHtml(f.colab.funcao||'—') : '—'}</td>
                  <td>${f.colab? escapeHtml(f.colab.unidade) : '—'}</td>
                  <td class="mono">${fmtDate(f.dataFeriado)}</td>
                  <td class="mono">${fmtDate(f.dataLimite)}</td>
                  <td><span class="badge ${f.statusInfo.badgeClass}"><span class="badge-dot"></span>${f.statusInfo.label}</span></td>
                  <td class="mono">${f.status==='gozada'? fmtDate(f.dataGozo) : '—'}</td>
                </tr>
              `).join('')}
          </tbody>
        </table>
      </div>
    </div>
  `;

  document.getElementById('rfUnidade').addEventListener('change', (e)=>{ reportFilters.unidade = e.target.value; renderRelatorios(); });
  document.getElementById('rfFuncao').addEventListener('change', (e)=>{ reportFilters.funcao = e.target.value; renderRelatorios(); });
  document.getElementById('rfStatus').addEventListener('change', (e)=>{ reportFilters.status = e.target.value; renderRelatorios(); });
  document.getElementById('rfBusca').addEventListener('input', (e)=>{ reportFilters.busca = e.target.value; renderRelatorios(); });
  document.getElementById('rfDataDe').addEventListener('change', (e)=>{ reportFilters.dataDe = e.target.value; renderRelatorios(); });
  document.getElementById('rfDataAte').addEventListener('change', (e)=>{ reportFilters.dataAte = e.target.value; renderRelatorios(); });
  document.getElementById('rfLimiteDe').addEventListener('change', (e)=>{ reportFilters.limiteDe = e.target.value; renderRelatorios(); });
  document.getElementById('rfLimiteAte').addEventListener('change', (e)=>{ reportFilters.limiteAte = e.target.value; renderRelatorios(); });
  const rfLimpar = document.getElementById('rfLimpar');
  if(rfLimpar) rfLimpar.addEventListener('click', ()=>{ reportFilters = {unidade:'', funcao:'', status:'', busca:'', dataDe:'', dataAte:'', limiteDe:'', limiteAte:''}; renderRelatorios(); });

  document.getElementById('rfExportar').addEventListener('click', ()=>{
    const header = ['Colaborador','Matrícula','Função','Unidade','Feriado trabalhado','Data limite','Status','Data de gozo'];
    const rows = linhas.map(f=>[
      f.colab? f.colab.nome : '(removido)',
      f.colab? (f.colab.matricula||'') : '',
      f.colab? (f.colab.funcao||'') : '',
      f.colab? f.colab.unidade : '',
      fmtDate(f.dataFeriado),
      fmtDate(f.dataLimite),
      f.statusInfo.label,
      f.status==='gozada'? fmtDate(f.dataGozo) : ''
    ]);
    const wb = XLSX.utils.book_new();
    const ws = XLSX.utils.aoa_to_sheet([header, ...rows]);
    XLSX.utils.book_append_sheet(wb, ws, 'Relatório');
    XLSX.writeFile(wb, `relatorio-folgas-${todayISO()}.xlsx`);
  });
}

/* ===================== Usuários (só master) ===================== */
function renderUsuarios(){
  const el = document.getElementById('pageContent');
  el.innerHTML = `
    <div class="card">
      <p class="card-title">Novo usuário</p>
      <p class="card-sub">A pessoa entra no sistema com o e-mail e a senha definidos aqui.</p>
      ${usuariosCriarError ? `<div class="login-error" style="margin-bottom:14px;">${escapeHtml(usuariosCriarError)}</div>` : ''}
      <form id="formNovoUsuario">
        <div class="form-grid">
          <div class="field"><label>Nome</label><input type="text" id="nuNome" required></div>
          <div class="field"><label>E-mail</label><input type="email" id="nuEmail" required></div>
          <div class="field"><label>Senha</label><input type="password" id="nuSenha" required minlength="6" placeholder="mín. 6 caracteres"></div>
          <div class="field">
            <label>Papel</label>
            <select id="nuPapel">
              <option value="visualizador">Visualizador (só vê)</option>
              <option value="editor">Editor (cria e edita)</option>
              <option value="master">Master (acesso total)</option>
            </select>
          </div>
        </div>
        <div class="btn-row"><button type="submit" class="btn btn-primary" id="nuSubmitBtn">Criar usuário</button></div>
      </form>
    </div>

    <div class="card">
      <p class="card-title">Usuários cadastrados</p>
      <div class="table-scroll">
        <table>
          <thead><tr><th>Nome</th><th>E-mail</th><th>Papel</th><th>Status</th><th></th></tr></thead>
          <tbody id="tbodyUsuarios"><tr class="empty-row"><td colspan="5">Carregando…</td></tr></tbody>
        </table>
      </div>
    </div>
  `;

  document.getElementById('formNovoUsuario').addEventListener('submit', async (e)=>{
    e.preventDefault();
    const nome = document.getElementById('nuNome').value.trim();
    const email = document.getElementById('nuEmail').value.trim();
    const senha = document.getElementById('nuSenha').value;
    const papel = document.getElementById('nuPapel').value;
    if(!nome || !email || !senha) return;
    const btn = document.getElementById('nuSubmitBtn');
    btn.disabled = true; btn.textContent = 'Criando…';
    try{
      await criarUsuario(nome, email, senha, papel);
      usuariosCriarError = '';
      alert('Usuário criado! Se a confirmação de e-mail estiver ativada no Supabase, a pessoa precisa confirmar o e-mail antes do primeiro login.');
      renderUsuarios();
    }catch(err){
      usuariosCriarError = err.message || 'Não foi possível criar o usuário.';
      renderUsuarios();
    }
  });

  carregarListaUsuarios().then(lista=>{
    const tbody = document.getElementById('tbodyUsuarios');
    if(!tbody) return;
    if(lista.length===0){ tbody.innerHTML = `<tr class="empty-row"><td colspan="5">Nenhum usuário encontrado.</td></tr>`; return; }
    tbody.innerHTML = lista.map(u=>{
      const propria = u.id === perfil.id;
      return `
        <tr>
          <td><strong>${escapeHtml(u.nome)}</strong>${propria? ' <span style="color:var(--ink-soft);font-weight:400;">(você)</span>' : ''}</td>
          <td>${escapeHtml(u.email)}</td>
          <td>
            <select data-papel="${u.id}" ${propria?'disabled':''}>
              <option value="visualizador" ${u.papel==='visualizador'?'selected':''}>Visualizador</option>
              <option value="editor" ${u.papel==='editor'?'selected':''}>Editor</option>
              <option value="master" ${u.papel==='master'?'selected':''}>Master</option>
            </select>
          </td>
          <td><span class="badge ${u.ativo?'badge-gozada':'badge-vencida'}"><span class="badge-dot"></span>${u.ativo?'Ativo':'Desativado'}</span></td>
          <td>${propria? '—' : `<button class="btn-link" data-toggle-ativo="${u.id}" data-ativo="${u.ativo}">${u.ativo?'Desativar':'Reativar'}</button>`}</td>
        </tr>
      `;
    }).join('');

    tbody.querySelectorAll('[data-papel]').forEach(sel=>sel.addEventListener('change', async (e)=>{
      const id = e.target.dataset.papel;
      const { error } = await sb.from('usuarios_perfil').update({papel: e.target.value}).eq('id', id);
      if(error){ alert('Não foi possível alterar o papel: ' + error.message); renderUsuarios(); }
    }));
    tbody.querySelectorAll('[data-toggle-ativo]').forEach(btn=>btn.addEventListener('click', async (e)=>{
      const id = e.target.dataset.toggleAtivo;
      const ativoAtual = e.target.dataset.ativo === 'true';
      if(!confirm(`Tem certeza que deseja ${ativoAtual?'desativar':'reativar'} este usuário?`)) return;
      const { error } = await sb.from('usuarios_perfil').update({ativo: !ativoAtual}).eq('id', id);
      if(error){ alert('Não foi possível atualizar: ' + error.message); return; }
      renderUsuarios();
    }));
  });
}

function renderConfiguracoes(){
  const el = document.getElementById('pageContent');
  const fotoAtual = tempFoto !== null ? tempFoto : perfil.foto;
  el.innerHTML = `
    <div class="card">
      <p class="card-title">Perfil do usuário</p>
      <div class="section-note" style="margin-bottom:14px;">Seu papel no sistema: <strong>${papelLabel(perfil.papel)}</strong>${!ehMaster() ? ' — só o Master pode alterar papéis (tela "Usuários").' : ''}</div>
      <div style="display:flex;align-items:center;gap:16px;margin-bottom:18px;">
        <div class="avatar-lg">${fotoAtual? `<img src="${fotoAtual}">` : initials(perfil.nome)}</div>
        <label class="btn btn-ghost btn-sm file-input-btn">Alterar foto<input type="file" accept="image/*" id="cfgFoto"></label>
        ${fotoAtual ? `<button class="btn-danger-text" id="cfgRemoveFoto">Remover foto</button>` : ''}
      </div>
      <form id="formConfig">
        <div class="form-grid">
          <div class="field"><label>Nome</label><input type="text" id="cfgNome" required value="${escapeAttr(perfil.nome)}"></div>
          <div class="field"><label>E-mail</label><input type="email" id="cfgEmail" required value="${escapeAttr(perfil.email)}"></div>
        </div>
        <div class="btn-row"><button type="submit" class="btn btn-primary">Salvar alterações</button></div>
      </form>
    </div>

    <div class="card">
      <p class="card-title">Alterar senha</p>
      <p class="card-sub">Deixe em branco caso não queira alterar a senha atual.</p>
      <form id="formSenha">
        <div class="form-grid">
          <div class="field"><label>Nova senha</label><input type="password" id="cfgSenha1"></div>
          <div class="field"><label>Confirmar nova senha</label><input type="password" id="cfgSenha2"></div>
        </div>
        <div class="btn-row"><button type="submit" class="btn btn-ghost">Atualizar senha</button></div>
      </form>
    </div>
  `;

  document.getElementById('cfgFoto').addEventListener('change', (e)=>{
    const file = e.target.files[0]; if(!file) return;
    const reader = new FileReader();
    reader.onload = (ev)=>{ tempFoto = ev.target.result; renderConfiguracoes(); };
    reader.readAsDataURL(file);
  });
  const removeFotoBtn = document.getElementById('cfgRemoveFoto');
  if(removeFotoBtn) removeFotoBtn.addEventListener('click', ()=>{ tempFoto = null; perfil.foto = null; renderConfiguracoes(); });

  document.getElementById('formConfig').addEventListener('submit', async (e)=>{
    e.preventDefault();
    const novoNome = document.getElementById('cfgNome').value.trim();
    const novoEmail = document.getElementById('cfgEmail').value.trim();
    if(novoEmail !== perfil.email){
      const { error } = await sb.auth.updateUser({ email: novoEmail });
      if(error){ alert('Não foi possível alterar o e-mail: ' + error.message); return; }
      alert('Um e-mail de confirmação foi enviado para o novo endereço. O e-mail de login só muda depois da confirmação.');
    }
    const novaFoto = tempFoto !== null ? tempFoto : perfil.foto;
    tempFoto = null;
    try{
      await salvarPerfilAtual({ nome: novoNome, email: novoEmail, foto: novaFoto });
    }catch(err){ return; }
    render();
  });

  document.getElementById('formSenha').addEventListener('submit', async (e)=>{
    e.preventDefault();
    const s1 = document.getElementById('cfgSenha1').value;
    const s2 = document.getElementById('cfgSenha2').value;
    if(!s1 && !s2) return;
    if(s1 !== s2){ alert('As senhas não coincidem.'); return; }
    if(s1.length < 6){ alert('A senha precisa ter pelo menos 6 caracteres.'); return; }
    const { error } = await sb.auth.updateUser({ password: s1 });
    if(error){ alert('Não foi possível atualizar a senha: ' + error.message); return; }
    alert('Senha atualizada.');
    renderConfiguracoes();
  });
}

/* ===================== Init ===================== */
(async function init(){
  const { data: { session } } = await sb.auth.getSession();
  if(session){
    const row = await carregarPerfilAtual();
    if(row && row.ativo){
      perfil = row;
      loggedIn = true;
      await loadData();
    }else{
      await sb.auth.signOut();
      loggedIn = false;
    }
  }
  render();
  sb.auth.onAuthStateChange((event)=>{
    if(event === 'SIGNED_OUT' && loggedIn){
      loggedIn = false;
      perfil = null; colaboradores = []; unidades = []; folgas = [];
      activePage = 'dashboard'; loginMode = 'login';
      render();
    }
  });
})();
</script>
